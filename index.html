```html
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aplikasi Kasir Modern</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <div class="top">
    <h1>🛒 Aplikasi Kasir</h1>

    <button onclick="toggleDarkMode()" class="dark-btn">
      🌙 Dark Mode
    </button>
  </div>

  <hr>

  <h2>Tambah Produk Baru</h2>

  <input type="text"
  id="namaProduk"
  placeholder="Nama Produk">

  <input type="number"
  id="hargaProduk"
  placeholder="Harga Produk">

  <button onclick="buatProduk()">
    Tambah Produk
  </button>

  <hr>

  <h2>Daftar Produk</h2>

  <div class="produk"></div>

  <hr>

  <h2>Keranjang</h2>

  <ul id="keranjang"></ul>

  <h3 id="total">Total: Rp0</h3>

  <input type="number"
  id="bayar"
  placeholder="Masukkan uang bayar">

  <button onclick="hitungKembalian()">
    Hitung Kembalian
  </button>

  <h3 id="kembalian">
    Kembalian: Rp0
  </h3>

  <div class="aksi">

    <button onclick="resetKasir()">
      Reset
    </button>

    <button onclick="simpanTransaksi()">
      Simpan
    </button>

    <button onclick="window.print()">
      Cetak Struk
    </button>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
```
